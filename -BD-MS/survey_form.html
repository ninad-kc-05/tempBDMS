<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeFlow – Donation Eligibility Survey</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="logo" onclick="goHome()">
        <img src="logo.jpeg" alt="LifeFlow">
    </div>
    <div class="nav-links">
        <button onclick="goDonorDashboard()">Back to Dashboard</button>
    </div>
</div>

<div class="container card-panel card-narrow">
    <h2 class="text-center">Donation Eligibility Survey</h2>
    <p class="text-muted mt-sm text-center">Please answer the following questions to check your eligibility.</p>

    <label>1. Are you between 18 and 65 years old?</label>
    <select id="q1">
        <option value="">-- Select --</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>

    <label>2. Do you weigh at least 50 kg (110 lbs)?</label>
    <select id="q2">
        <option value="">-- Select --</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>

    <label>3. Have you donated blood in the last 3 months?</label>
    <select id="q3">
        <option value="">-- Select --</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>

    <label>4. Are you currently on any medication?</label>
    <select id="q4">
        <option value="">-- Select --</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>

    <label>5. Have you had any illness in the past 2 weeks?</label>
    <select id="q5">
        <option value="">-- Select --</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>

    <label>6. Do you have any chronic conditions (diabetes, heart disease, etc.)?</label>
    <select id="q6">
        <option value="">-- Select --</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>

    <button class="btn btn-primary" style="width:100%; margin-top:0.75rem;" onclick="checkEligibility()">Check Eligibility</button>

    <div id="resultBox" style="display:none; margin-top:1rem; padding:1rem; border-radius:var(--radius-md); text-align:center; font-weight:600;"></div>
</div>

<div class="footer">
    &copy; 2025 LifeFlow | Blood Donation Management System
</div>

<script>
function goHome() { window.location.href = "index.html"; }
function goDonorDashboard() { window.location.href = "donor-dashboard.html"; }

function checkEligibility() {
    var q1 = document.getElementById("q1").value;
    var q2 = document.getElementById("q2").value;
    var q3 = document.getElementById("q3").value;
    var q4 = document.getElementById("q4").value;
    var q5 = document.getElementById("q5").value;
    var q6 = document.getElementById("q6").value;

    if (!q1 || !q2 || !q3 || !q4 || !q5 || !q6) {
        alert("Please answer all questions.");
        return;
    }

    var box = document.getElementById("resultBox");
    box.style.display = "block";

    // Eligible: 18-65, 50kg+, no recent donation, no medication, no illness, no chronic
    if (q1 === "yes" && q2 === "yes" && q3 === "no" && q4 === "no" && q5 === "no" && q6 === "no") {
        box.style.background = "rgba(34,197,94,0.15)";
        box.style.color = "#22c55e";
        box.style.border = "1px solid rgba(34,197,94,0.3)";
        box.innerHTML = "&#10003; You are eligible to donate blood! You may proceed to schedule a donation.";
    } else {
        box.style.background = "rgba(239,68,68,0.15)";
        box.style.color = "#ef4444";
        box.style.border = "1px solid rgba(239,68,68,0.3)";
        box.innerHTML = "&#10007; Based on your answers, you are currently not eligible to donate. Please consult a medical professional.";
    }
}
</script>

</body>
</html>
