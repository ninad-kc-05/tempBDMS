<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeFlow – Schedule Donation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="header-top">
        <div class="logo" onclick="goHome()">
      <img src="logo.jpeg" alt="LifeFlow" />
    </div>
    <div class="nav-links">
      <button onclick="goDonorDashboard()">Back to Dashboard</button>
    </div>
  </div>

  <div class="container card-panel card-narrow">
    <h2 class="text-center">Schedule Donation (Dummy)</h2>
    <p class="text-muted mt-sm text-center">This is sample content showing how a scheduling form might look.</p>

    <label>Preferred Date</label>
    <input type="date" />

    <label>Preferred Time Slot</label>
    <select>
      <option>09:00 – 11:00</option>
      <option>11:00 – 13:00</option>
      <option>14:00 – 16:00</option>
    </select>

    <label>Center</label>
    <select>
      <option>CityCare Hospital</option>
      <option>LifeCare Blood Bank</option>
      <option>Metro Hospital</option>
    </select>

    <button class="btn btn-primary" style="width:100%; margin-top:0.5rem;" onclick="fakeSubmit()">Confirm (Dummy)</button>
  </div>

  <div class="footer">
    © 2025 LifeFlow | Blood Donation Management System
  </div>

  <script>
    function goHome() { window.location.href = "index.html"; }
    function goDonorDashboard() { window.location.href = "donor-dashboard.html"; }
    function fakeSubmit() { alert("This is a dummy scheduling form."); }
  </script>
</body>
</html>
