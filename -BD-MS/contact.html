<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeFlow – Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="page-contact">

<div class="header">
    <div class="header-top">
        <div class="logo" onclick="goHome()">
        <img src="logo.jpeg">
    </div>
    <div class="nav-links">
        <button onclick="goHome()">Home</button>
        <button onclick="goAbout()">About</button>
        <button onclick="goTeam()">Team</button>
    </div>
</div>

<div class="container card-panel card-narrow">
    <h2 class="text-center">Contact Us</h2>
    <p class="text-muted mt-sm">Reach out to the LifeFlow team for any questions about donations, requests, or your account.</p>

    <label>Name</label>
    <input type="text" placeholder="Your Name">

    <label>Email</label>
    <input type="email" placeholder="Your Email">

    <label>Message</label>
    <textarea placeholder="Your message..."></textarea>

    <button class="btn btn-primary" style="width:100%;" onclick="send()">Send Message</button>
</div>

<div class="footer">
    © 2025 LifeFlow | Blood Donation Management System
</div>

<script>
function goHome() { window.location.href = "index.html"; }
function goAbout() { window.location.href = "about.html"; }
function goTeam() { window.location.href = "team.html"; }
function send() {
    alert("Message sent successfully! (dummy)");
}
</script>

</body>
</html>
