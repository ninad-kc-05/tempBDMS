<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeFlow – Register</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="header-top">
        <div class="logo" onclick="goHome()">
        <img src="logo.jpeg">
    </div>

    <div class="nav-links">
        <button onclick="goHome()">Home</button>
        <button onclick="goLogin()">Login</button>
    </div>
</div>

<!-- Registration Chooser -->
<div class="container">
    <h2 class="text-center">Create Account</h2>
    <p class="text-muted text-center mt-sm">Select your registration type below.</p>

    <div class="role-cards mt-lg" style="max-width:640px; margin-left:auto; margin-right:auto;">
        <div class="card">
            <h3>Donor Registration</h3>
            <p>Register as a blood donor using your mobile number and OTP.</p>
            <button class="btn btn-primary" onclick="goToDonorReg()">Register as Donor</button>
        </div>

        <div class="card">
            <h3>Admin / Hospital Registration</h3>
            <p>Register as an admin or hospital with email and password.</p>
            <button class="btn btn-primary" onclick="goToCommonReg()">Register as Admin / Hospital</button>
                </div>
    </div>

<!-- Footer -->
<div class="footer">
    © 2025 LifeFlow | Blood Donation Management System
</div>

<script>
function goHome() { window.location.href = "index.html"; }
function goLogin() { window.location.href = "login.html"; }
function goToDonorReg() { window.location.href = "donor_register.html"; }
function goToCommonReg() { window.location.href = "common_register.html"; }

// Auto-redirect if role param is provided
(function autoRedirect() {
    const params = new URLSearchParams(window.location.search);
    const role = params.get("role");
    if (role === "donor") window.location.href = "donor_register.html";
    else if (role === "receiver" || role === "admin") window.location.href = "common_register.html?role=" + role;
})();
</script>

</body>
</html>
