<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeFlow – Admin Inventory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="header-top">
        <div class="logo" onclick="goHome()">
      <img src="logo.jpeg" alt="LifeFlow" />
    </div>
    <div class="nav-links">
      <button onclick="goAdminDashboard()">Back to Dashboard</button>
    </div>
  </div>

  <div class="container card-panel card-wide">
    <h2 class="section-title">Blood <span>Inventory</span></h2>

    <!-- Total Summary -->
    <div class="inventory-summary">
      <div class="inv-number">87</div>
      <div>
        <div class="inv-label">Total Blood Bags Available</div>
        <div style="font-size:0.8rem; color:var(--color-text-muted); margin-top:0.2rem;">All blood groups combined across all hospitals        </div>
    </div>

    <!-- Breakdown by Blood Group -->
    <div class="cards">
      <div class="card" style="text-align:center;">
        <h3 style="color:var(--color-primary);">O+</h3>
        <p style="font-size:1.8rem; font-weight:700; margin:0.25rem 0;">38</p>
        <p class="text-muted" style="font-size:0.8rem;">bags</p>
      </div>
      <div class="card" style="text-align:center;">
        <h3 style="color:var(--color-primary);">A+</h3>
        <p style="font-size:1.8rem; font-weight:700; margin:0.25rem 0;">22</p>
        <p class="text-muted" style="font-size:0.8rem;">bags</p>
      </div>
      <div class="card" style="text-align:center;">
        <h3 style="color:var(--color-primary);">B+</h3>
        <p style="font-size:1.8rem; font-weight:700; margin:0.25rem 0;">21</p>
        <p class="text-muted" style="font-size:0.8rem;">bags</p>
      </div>
      <div class="card" style="text-align:center;">
        <h3 style="color:var(--color-primary);">AB-</h3>
        <p style="font-size:1.8rem; font-weight:700; margin:0.25rem 0;">6</p>
        <p class="text-muted" style="font-size:0.8rem;">bags</p>
      </div>
    </div>
  </div>

  <div class="footer">
    © 2025 LifeFlow | Blood Donation Management System
  </div>

  <script>
    function goHome() { window.location.href = "index.html"; }
    function goAdminDashboard() { window.location.href = "admin-dashboard.html"; }
  </script>
</body>
</html>
