<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeFlow – Donor Profile</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="header-top">
        <div class="logo" onclick="goHome()">
      <img src="logo.jpeg" alt="LifeFlow" />
    </div>
    <div class="nav-links">
      <button onclick="goDonorDashboard()">Back to Dashboard</button>
    </div>
  </div>

  <div class="container card-panel card-narrow">
    <!-- Avatar Placeholder -->
    <div style="text-align:center; margin-bottom:1rem;">
      <div style="width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg, var(--color-primary), #ff4b82); display:inline-flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:700; color:#fff;">R</div>
    </div>
    <h2 class="text-center">My Profile</h2>
    <p class="text-muted mt-sm text-center">Update your personal details below.</p>

    <label>Full Name</label>
    <input type="text" value="Rohan S." />

    <label>Blood Group</label>
    <input type="text" value="O+" />

    <label>Phone</label>
    <input type="text" value="+91-9876543210" />

    <label>City</label>
    <input type="text" value="Pune" />

    <label>Email</label>
    <input type="email" value="rohan@example.com" />

    <button class="btn btn-primary" style="width:100%; margin-top:0.5rem;" onclick="fakeSave()">Save Changes</button>
  </div>

  <div class="footer">
    © 2025 LifeFlow | Blood Donation Management System
  </div>

  <script>
    function goHome() { window.location.href = "index.html"; }
    function goDonorDashboard() { window.location.href = "donor-dashboard.html"; }
    function fakeSave() { alert("Profile save is dummy in this prototype."); }
  </script>
</body>
</html>
